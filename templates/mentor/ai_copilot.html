{% extends "layout.html" %}
{% block title %}AI 带教助手 - 实习能量站{% endblock %}
{% block content %}
<div class="page-header">
    <h1>🤖 AI 带教助手</h1>
    <p>输入你遇到的带教情境，AI 为你提供实时建议</p>
</div>

<div class="card">
    <div class="card-header">💬 AI 对话</div>
    <div id="chat-container" style="height:400px; overflow-y:auto; padding:16px; background:#fafafa; border-radius:8px; margin-bottom:16px;">
        <div style="padding:12px; background:white; border-radius:8px; margin-bottom:8px; border:1px solid var(--border);">
            <div style="font-weight:500; margin-bottom:4px; color:var(--primary);">🤖 AI 助手</div>
            <div style="font-size:0.85rem; color:var(--text-secondary); white-space:pre-wrap;">你好！我是你的AI带教助手。你可以描述你遇到的带教情境，我会给你专业的建议</div>
        </div>
    </div>
    <div style="display:flex; gap:8px;">
        <input type="text" id="chat-input" class="form-control" placeholder="输入你的问题..." style="flex:1;" onkeypress="if(event.key==='Enter')sendChat()">
        <button onclick="sendChat()" class="btn btn-primary">发送</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function sendChat() {
    const input = document.getElementById('chat-input');
    const question = input.value.trim();
    if (!question) return;

    const container = document.getElementById('chat-container');

    const userMsg = document.createElement('div');
    userMsg.style.cssText = 'padding:12px; background:var(--primary); color:white; border-radius:8px; margin-bottom:8px; text-align:right;';
    userMsg.innerHTML = '<div style="font-weight:500; margin-bottom:4px;">我</div><div style="font-size:0.85rem;">' + question + '</div>';
    container.appendChild(userMsg);

    input.value = '';
    container.scrollTop = container.scrollHeight;

    const loading = document.createElement('div');
    loading.id = 'loading-msg';
    loading.style.cssText = 'padding:12px; background:white; border-radius:8px; margin-bottom:8px; border:1px solid var(--border);';
    loading.innerHTML = '<div style="font-weight:500; margin-bottom:4px; color:var(--primary);">🤖 AI 助手</div><div style="font-size:0.85rem; color:var(--text-muted);">思考中...</div>';
    container.appendChild(loading);
    container.scrollTop = container.scrollHeight;

    fetch('/api/mentor/ai-chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: question })
    })
    .then(res => res.json())
    .then(data => {
        const loadingEl = document.getElementById('loading-msg');
        if (loadingEl) loadingEl.remove();

        const aiMsg = document.createElement('div');
        aiMsg.style.cssText = 'padding:12px; background:white; border-radius:8px; margin-bottom:8px; border:1px solid var(--border);';
        aiMsg.innerHTML = '<div style="font-weight:500; margin-bottom:4px; color:var(--primary);">🤖 AI 助手</div><div style="font-size:0.85rem; color:var(--text-secondary); white-space:pre-wrap;">' + (data.response || data.error) + '</div>';
        container.appendChild(aiMsg);
        container.scrollTop = container.scrollHeight;
    })
    .catch(err => {
        const loadingEl = document.getElementById('loading-msg');
        if (loadingEl) loadingEl.remove();
    });
}
</script>
{% endblock %}
